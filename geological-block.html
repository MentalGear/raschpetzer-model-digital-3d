<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parametric 3D Geological Block Model</title>
    <style>
        :root {
            --bg-color: #1e1e24;
            --panel-bg: rgba(30, 30, 38, 0.85);
            --text-color: #f3f4f6;
            --accent-orange: #f97316;
            --accent-blue: #3b82f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            display: flex;
            height: 100vh;
        }

        #canvas-container {
            flex-grow: 1;
            height: 100%;
            position: relative;
        }

        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 340px;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 10;
            max-height: 90vh;
            overflow-y: auto;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #ffffff;
        }

        h2 {
            font-size: 0.85rem;
            color: #9ca3af;
            margin-bottom: 20px;
            font-weight: 400;
        }

        .control-group {
            margin-bottom: 18px;
        }

        .control-group label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 6px;
            color: #d1d5db;
        }

        .control-group label span.val {
            color: var(--accent-orange);
            font-weight: 600;
        }

        input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            background: #4b5563;
            height: 6px;
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent-orange);
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .legend {
            margin-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            font-size: 0.8rem;
            margin-bottom: 8px;
            color: #9ca3af;
        }

        .color-box {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            margin-right: 10px;
        }

        .instructions {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            pointer-events: none;
            letter-spacing: 0.5px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="ui-panel">
        <h1>Geological Block</h1>
        <h2>Parametric Model Generator</h2>

        <div class="control-group">
            <label>Plateau Height <span class="val" id="lbl-plateau">5.0</span></label>
            <input type="range" id="param-plateau" min="2.0" max="8.0" step="0.1" value="5.0">
        </div>

        <div class="control-group">
            <label>Hillside Slope Drop <span class="val" id="lbl-hillside">4.5</span></label>
            <input type="range" id="param-hillside" min="2.0" max="7.0" step="0.1" value="4.5">
        </div>

        <div class="control-group">
            <label>Depression Depth <span class="val" id="lbl-depression">3.0</span></label>
            <input type="range" id="param-depression" min="0.5" max="5.0" step="0.1" value="3.0">
        </div>

        <div class="control-group">
            <label>Contour Line Spacing <span class="val" id="lbl-contours">0.40</span></label>
            <input type="range" id="param-contours" min="0.15" max="1.0" step="0.05" value="0.40">
        </div>

        <div class="control-group">
            <label>Geological Layer Depth <span class="val" id="lbl-layer">4.0</span></label>
            <input type="range" id="param-layer" min="2.5" max="6.0" step="0.1" value="4.0">
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="color-box" style="background: var(--accent-orange);"></div>
                Excavation/Observation Pillars (P-7A to P9)
            </div>
            <div class="legend-item">
                <div class="color-box" style="background: var(--accent-blue);"></div>
                Subsurface Geological Horizon Line
            </div>
        </div>
    </div>

    <div id="canvas-container"></div>
    <div class="instructions">Left Click + Drag to Rotate | Right Click + Drag to Pan | Scroll to Zoom</div>

    <script>
        // --- Parameters Object ---
        const params = {
            plateauHeight: 5.0,
            hillsideDrop: 4.5,
            depressionDepth: 3.0,
            contourSpacing: 0.40,
            layerDepth: 4.0,

            // Fixed dimensions
            width: 50,
            depth: 22,
            baseY: -3
        };

        // Pillar Positions matching the layout structure of the original diagram
        const pillarDefs = [
            { id: "P-7A", x: -21, z: -2 },
            { id: "P-5A", x: -18, z: -1 },
            { id: "P-5",  x: -15, z: 0.5 },
            { id: "P-4",  x: -12, z: 2 },
            { id: "P-1",  x: -5,  z: 3 },
            { id: "P0",   x: -2,  z: 2.5 },
            { id: "P1",   x: 1,   z: 1.5 },
            { id: "P2",   x: 4,   z: 0.5 },
            { id: "P3",   x: 8,   z: 0 },
            { id: "P4",   x: 13,  z: 1 },
            { id: "P5",   x: 18,  z: 2.5 },
            { id: "P6",   x: 21,  z: 1 },
            { id: "P7",   x: 23,  z: -0.5 },
            { id: "P8",   x: 25,  z: -2 },
            { id: "P9",   x: 27,  z: -3.5 }
        ];

        // --- Three.js Setup Variables ---
        let scene, camera, renderer, controls;
        let modelGroup;
        let contourMaterial;

        // --- Core Procedural Topography Engine ---
        function getTerrainHeight(x, z) {
            let h = params.plateauHeight;

            // West-side Slope (Alzette hillside)
            if (x < -6) {
                let t = Math.min(Math.max((-6 - x) / 16, 0), 1);
                let ease = t * t * (3 - 2 * t);
                h -= ease * params.hillsideDrop;
            }
            // East-side Basin (Haedchen Depression)
            else if (x > 9) {
                let t = Math.min(Math.max((x - 9) / 15, 0), 1);
                let ease = Math.sin(t * Math.PI * 0.5);
                h -= ease * params.depressionDepth;
                if (x > 24) {
                    h += (x - 24) * 0.25;
                }
            }

            h += Math.sin(z * 0.25) * 0.4;
            h += Math.cos(x * 0.15) * 0.2;

            return h;
        }

        function getLayerHeight(x, z) {
            return getTerrainHeight(x, z) - params.layerDepth + (Math.sin(x * 0.1) * 0.3);
        }

        // --- Initialize Engine Window ---
        function init() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111115);

            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 1, 1000);
            camera.position.set(0, 25, 45);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.sortObjects = true;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.05;

            // Lighting Design
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(20, 40, 20);
            dirLight.castShadow = true;
            scene.add(dirLight);

            const fillLight = new THREE.DirectionalLight(0x90b0ff, 0.3);
            fillLight.position.set(-20, 20, -20);
            scene.add(fillLight);

            // Shader Material for clean, procedural anti-aliased Topographic Contour Lines
            contourMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    lineColor: { value: new THREE.Color(0x855840) },
                    baseColor: { value: new THREE.Color(0xd9ccbe) },
                    contourSpacing: { value: params.contourSpacing }
                },
                vertexShader: `
                    varying vec3 vWorldPos;
                    void main() {
                        vec4 worldPos = modelMatrix * vec4(position, 1.0);
                        vWorldPos = worldPos.xyz;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec3 vWorldPos;
                    uniform vec3 lineColor;
                    uniform vec3 baseColor;
                    uniform float contourSpacing;
                    void main() {
                        float y = vWorldPos.y;
                        float dF = fwidth(y / contourSpacing);
                        float linePattern = abs(fract(y / contourSpacing - 0.5) - 0.5) / dF;
                        float contourIntensity = 1.0 - min(linePattern, 1.0);
                        gl_FragColor = vec4(mix(baseColor, lineColor, contourIntensity), 1.0);
                    }
                `,
                side: THREE.DoubleSide
            });

            // Cross-section shader for the exposed front face — shows geological strata bands
            // with contour lines, making the interior visible when the front wall is removed
            const crossSectionMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    lineColor:      { value: new THREE.Color(0x6b4c3b) },
                    strataColor1:   { value: new THREE.Color(0xc8b89a) },
                    strataColor2:   { value: new THREE.Color(0xa89070) },
                    strataColor3:   { value: new THREE.Color(0x8a7060) },
                    contourSpacing: { value: params.contourSpacing }
                },
                vertexShader: `
                    varying vec3 vWorldPos;
                    void main() {
                        vec4 worldPos = modelMatrix * vec4(position, 1.0);
                        vWorldPos = worldPos.xyz;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec3 vWorldPos;
                    uniform vec3 lineColor;
                    uniform vec3 strataColor1;
                    uniform vec3 strataColor2;
                    uniform vec3 strataColor3;
                    uniform float contourSpacing;

                    void main() {
                        float y = vWorldPos.y;

                        // Alternate geological strata bands by world-space Y
                        float bandWidth = 1.8;
                        float band = mod(floor(y / bandWidth), 3.0);
                        vec3 strataColor = band < 0.5 ? strataColor1
                                         : band < 1.5 ? strataColor2
                                         : strataColor3;

                        // Overlay contour lines
                        float dF = fwidth(y / contourSpacing);
                        float linePattern = abs(fract(y / contourSpacing - 0.5) - 0.5) / dF;
                        float contourIntensity = 1.0 - min(linePattern, 1.0);

                        vec3 col = mix(strataColor, lineColor, contourIntensity * 0.85);
                        gl_FragColor = vec4(col, 1.0);
                    }
                `,
                side: THREE.DoubleSide
            });

            modelGroup = new THREE.Group();
            scene.add(modelGroup);

            buildParametricModel(crossSectionMaterial);
            setupUIEventListeners(crossSectionMaterial);

            window.addEventListener('resize', onWindowResize);
        }

        // --- Model Generation Pipeline ---
        function buildParametricModel(crossSectionMaterial) {
            while(modelGroup.children.length > 0){
                const obj = modelGroup.children[0];
                modelGroup.remove(obj);
            }

            const segmentsX = 90;
            const segmentsZ = 40;
            const halfW = params.width / 2;
            const halfD = params.depth / 2;

            // 1. Generate Surface Mesh
            const surfaceGeo = new THREE.PlaneGeometry(params.width, params.depth, segmentsX, segmentsZ);
            surfaceGeo.rotateX(-Math.PI / 2);

            const posAttr = surfaceGeo.attributes.position;
            for (let i = 0; i < posAttr.count; i++) {
                let x = posAttr.getX(i);
                let z = posAttr.getZ(i);
                posAttr.setY(i, getTerrainHeight(x, z));
            }
            surfaceGeo.computeVertexNormals();
            const surfaceMesh = new THREE.Mesh(surfaceGeo, contourMaterial);
            surfaceMesh.castShadow = true;
            surfaceMesh.receiveShadow = true;
            modelGroup.add(surfaceMesh);

            // 2. Generate Solid Geological Block Skirt
            const sideMat = new THREE.MeshStandardMaterial({ color: 0x6e5d4f, roughness: 0.8, side: THREE.DoubleSide });
            const baseMat = new THREE.MeshStandardMaterial({ color: 0x3a312a, roughness: 0.9 });

            // buildWall accepts an explicit material so the front wall can differ
            function buildWall(points, isConstantX, fixedVal, mat) {
                const wallGeo = new THREE.BufferGeometry();
                const vertices = [];

                for(let i=0; i < points.length - 1; i++) {
                    let p1 = points[i];
                    let p2 = points[i+1];

                    let x1 = isConstantX ? fixedVal : p1;
                    let z1 = isConstantX ? p1 : fixedVal;
                    let x2 = isConstantX ? fixedVal : p2;
                    let z2 = isConstantX ? p2 : fixedVal;

                    let y1 = getTerrainHeight(x1, z1);
                    let y2 = getTerrainHeight(x2, z2);

                    vertices.push(x1, y1, z1);
                    vertices.push(x1, params.baseY, z1);
                    vertices.push(x2, y2, z2);
                    vertices.push(x2, y2, z2);
                    vertices.push(x1, params.baseY, z1);
                    vertices.push(x2, params.baseY, z2);
                }
                wallGeo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
                wallGeo.computeVertexNormals();
                modelGroup.add(new THREE.Mesh(wallGeo, mat));
            }

            const xSteps = [], zSteps = [];
            for(let i=0; i<=segmentsX; i++) xSteps.push(-halfW + (i/segmentsX)*params.width);
            for(let i=0; i<=segmentsZ; i++) zSteps.push(-halfD + (i/segmentsZ)*params.depth);

            buildWall(xSteps, false, -halfD, sideMat);   // North Wall (back)
            // South Wall (front, camera-facing) uses the cross-section shader
            // instead of an opaque skirt so the interior is fully visible from
            // the default camera position.
            buildWall(xSteps, false,  halfD, crossSectionMaterial);
            buildWall(zSteps, true,  -halfW, sideMat);   // West Wall
            buildWall(zSteps, true,   halfW, sideMat);   // East Wall

            // Solid Base Cap
            const baseGeo = new THREE.PlaneGeometry(params.width, params.depth);
            baseGeo.rotateX(Math.PI / 2);
            const baseMesh = new THREE.Mesh(baseGeo, baseMat);
            baseMesh.position.y = params.baseY;
            modelGroup.add(baseMesh);

            // 3. Generate Structural Pillars & Subsurface Horizon Line
            const pillarMaterial = new THREE.MeshStandardMaterial({ color: 0xf97316, roughness: 0.3, metalness: 0.1 });
            const layerPoints = [];

            pillarDefs.forEach(p => {
                const surfaceY = getTerrainHeight(p.x, p.z);
                const layerY = getLayerHeight(p.x, p.z);

                layerPoints.push(new THREE.Vector3(p.x, layerY, p.z));

                const pillarLength = surfaceY - layerY;
                if(pillarLength > 0) {
                    const pillarGeo = new THREE.CylinderGeometry(0.18, 0.18, pillarLength, 12);
                    const pillarMesh = new THREE.Mesh(pillarGeo, pillarMaterial);
                    pillarMesh.position.set(p.x, surfaceY - (pillarLength/2), p.z);
                    modelGroup.add(pillarMesh);
                }

                const labelSprite = createTextSprite(p.id);
                labelSprite.position.set(p.x, surfaceY + 0.8, p.z);
                modelGroup.add(labelSprite);
            });

            const curve = new THREE.CatmullRomCurve3(layerPoints);
            const tubeGeo = new THREE.TubeGeometry(curve, 100, 0.12, 8, false);
            const tubeMat = new THREE.MeshBasicMaterial({ color: 0x2563eb });
            const tubeMesh = new THREE.Mesh(tubeGeo, tubeMat);
            modelGroup.add(tubeMesh);

            // 4. Geographic Text Overlays
            const labelAlzette = createTextSprite("Alzette Hillside", "#9ca3af", 32);
            labelAlzette.position.set(-16, getTerrainHeight(-16, 0) + 3.5, 0);
            modelGroup.add(labelAlzette);

            const labelPetschend = createTextSprite("Pëtschend Plateau", "#ffffff", 36);
            labelPetschend.position.set(1, getTerrainHeight(1, 0) + 4.5, 0);
            modelGroup.add(labelPetschend);

            const labelHaedchen = createTextSprite("Haedchen Depression", "#9ca3af", 32);
            labelHaedchen.position.set(19, getTerrainHeight(19, 0) + 3.5, 0);
            modelGroup.add(labelHaedchen);
        }

        // --- Custom Text Sprite Rasterizer ---
        function createTextSprite(text, colorStr = '#1e293b', customSize = 26) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = 'rgba(0,0,0,0)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = `Bold ${customSize}px -apple-system, sans-serif`;
            ctx.fillStyle = colorStr;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0, 0, 0, 0.8)';
            ctx.shadowBlur = 4;
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);

            const texture = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.scale.set(5, 1.25, 1);
            return sprite;
        }

        // --- Controller UI Synchronization Setup ---
        function setupUIEventListeners(crossSectionMaterial) {
            const bindParam = (id, paramKey, labelId, isFixed = false) => {
                const slider = document.getElementById(id);
                const label = document.getElementById(labelId);

                slider.addEventListener('input', (e) => {
                    let val = parseFloat(e.target.value);
                    params[paramKey] = val;
                    label.innerText = isFixed ? val : val.toFixed(2);

                    if(paramKey === 'contourSpacing') {
                        contourMaterial.uniforms.contourSpacing.value = val;
                        crossSectionMaterial.uniforms.contourSpacing.value = val;
                    } else {
                        buildParametricModel(crossSectionMaterial);
                    }
                });
            };

            bindParam('param-plateau',    'plateauHeight',   'lbl-plateau');
            bindParam('param-hillside',   'hillsideDrop',    'lbl-hillside');
            bindParam('param-depression', 'depressionDepth', 'lbl-depression');
            bindParam('param-contours',   'contourSpacing',  'lbl-contours');
            bindParam('param-layer',      'layerDepth',      'lbl-layer');
        }

        function onWindowResize() {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        // --- Animation Render Loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
