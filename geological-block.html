<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parametric 3D Geological Block Model</title>
    <style>
        :root {
            --bg-color: #f5f0ea;
            --panel-bg: rgba(22, 22, 30, 0.93);
            --text-color: #f3f4f6;
            --accent-orange: #f97316;
            --accent-blue: #3b82f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            display: flex;
            height: 100vh;
        }

        #canvas-container {
            flex-grow: 1;
            height: 100%;
            position: relative;
        }

        /* Corner compass labels */
        .compass-label {
            position: absolute;
            top: 18px;
            font-style: italic;
            font-size: 1.05rem;
            font-weight: 400;
            color: #222;
            pointer-events: none;
            letter-spacing: 0.3px;
            z-index: 5;
        }
        #label-west { left: 22px; }
        #label-east { right: 362px; }

        /* Scale bar */
        #scale-bar {
            position: absolute;
            bottom: 26px;
            left: 22px;
            pointer-events: none;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
        }
        #scale-bar .bar-line {
            display: flex;
            align-items: center;
        }
        #scale-bar .bar-cap { width: 1px; height: 10px; background: #333; }
        #scale-bar .bar-fill { width: 90px; height: 2px; background: #333; }
        #scale-bar .bar-text { font-size: 0.8rem; color: #333; margin-top: 2px; }

        #ui-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 330px;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 22px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
            z-index: 10;
            max-height: 90vh;
            overflow-y: auto;
        }

        h1 { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; letter-spacing: 0.5px;
             text-transform: uppercase; color: #fff; }
        h2 { font-size: 0.8rem; color: #9ca3af; margin-bottom: 18px; font-weight: 400; }

        .control-group { margin-bottom: 16px; }
        .control-group label { display: flex; justify-content: space-between;
            font-size: 0.82rem; margin-bottom: 5px; color: #d1d5db; }
        .control-group label span.val { color: var(--accent-orange); font-weight: 600; }

        input[type="range"] { width: 100%; -webkit-appearance: none; background: #374151;
            height: 5px; border-radius: 3px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 15px;
            border-radius: 50%; background: var(--accent-orange); cursor: pointer; transition: transform 0.1s; }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

        .legend { margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 12px; }
        .legend-item { display: flex; align-items: center; font-size: 0.78rem; margin-bottom: 7px; color: #9ca3af; }
        .color-box { width: 13px; height: 13px; border-radius: 3px; margin-right: 9px; flex-shrink: 0; }

        .instructions { position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.45);
            padding: 7px 14px; border-radius: 20px; font-size: 0.75rem; pointer-events: none;
            letter-spacing: 0.4px; color: #ddd; }
    </style>
    <script src="three.min.js"></script>
    <script src="OrbitControls.js"></script>
</head>
<body>

    <div id="ui-panel">
        <h1>Geological Block</h1>
        <h2>Parametric Model Generator</h2>

        <div class="control-group">
            <label>Plateau Height <span class="val" id="lbl-plateau">5.0</span></label>
            <input type="range" id="param-plateau" min="2.0" max="8.0" step="0.1" value="5.0">
        </div>
        <div class="control-group">
            <label>Hillside Slope Drop <span class="val" id="lbl-hillside">4.5</span></label>
            <input type="range" id="param-hillside" min="2.0" max="7.0" step="0.1" value="4.5">
        </div>
        <div class="control-group">
            <label>Depression Depth <span class="val" id="lbl-depression">3.0</span></label>
            <input type="range" id="param-depression" min="0.5" max="5.0" step="0.1" value="3.0">
        </div>
        <div class="control-group">
            <label>Contour Line Spacing <span class="val" id="lbl-contours">0.20</span></label>
            <input type="range" id="param-contours" min="0.10" max="1.0" step="0.05" value="0.20">
        </div>
        <div class="control-group">
            <label>Geological Layer Depth <span class="val" id="lbl-layer">5.0</span></label>
            <input type="range" id="param-layer" min="2.5" max="7.5" step="0.1" value="5.0">
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="color-box" style="background: var(--accent-orange);"></div>
                Observation Pillars (P-7A to P9)
            </div>
            <div class="legend-item">
                <div class="color-box" style="background: var(--accent-blue);"></div>
                Subsurface Geological Horizon
            </div>
        </div>
    </div>

    <div id="canvas-container">
        <span class="compass-label" id="label-west"><em>West</em></span>
        <span class="compass-label" id="label-east"><em>East</em></span>

        <div id="scale-bar">
            <div class="bar-line">
                <div class="bar-cap"></div>
                <div class="bar-fill"></div>
                <div class="bar-cap"></div>
            </div>
            <div class="bar-text">100 m</div>
        </div>
    </div>

    <div class="instructions">Drag to rotate · Right-drag to pan · Scroll to zoom</div>

    <script>
        const params = {
            plateauHeight: 5.0,
            hillsideDrop: 4.5,
            depressionDepth: 3.0,
            contourSpacing: 0.20,
            layerDepth: 5.0,
            width: 60,
            depth: 26,
            baseY: -2
        };

        const pillarDefs = [
            { id: "P-7A", x: -21, z: -1.5 },
            { id: "P-5A", x: -18, z: -0.5 },
            { id: "P-5",  x: -15, z: 1 },
            { id: "P-4",  x: -12, z: 2.5 },
            { id: "P-1",  x: -5,  z: 3 },
            { id: "P0",   x: -2,  z: 2.5 },
            { id: "P1",   x: 1,   z: 1.5 },
            { id: "P2",   x: 4,   z: 0.5 },
            { id: "P3",   x: 8,   z: 0 },
            { id: "P4",   x: 13,  z: 1 },
            { id: "P5",   x: 18,  z: 2 },
            { id: "P6",   x: 21,  z: 0.5 },
            { id: "P7",   x: 23,  z: -0.5 },
            { id: "P8",   x: 25,  z: -1.5 },
            { id: "P9",   x: 27,  z: -3 }
        ];

        let scene, camera, renderer, controls, modelGroup;
        let contourMaterial, crossSectionMaterial;

        function getTerrainHeight(x, z) {
            let h = params.plateauHeight;
            if (x < -6) {
                let t = Math.min(Math.max((-6 - x) / 16, 0), 1);
                let ease = t * t * (3 - 2 * t);
                h -= ease * params.hillsideDrop;
            } else if (x > 9) {
                let t = Math.min(Math.max((x - 9) / 15, 0), 1);
                let ease = Math.sin(t * Math.PI * 0.5);
                h -= ease * params.depressionDepth;
                if (x > 24) h += (x - 24) * 0.25;
            }
            h += Math.sin(z * 0.25) * 0.4;
            h += Math.cos(x * 0.15) * 0.2;
            return h;
        }

        function getLayerHeight(x, z) {
            // Flat-lying geological horizon so pillar heights directly encode
            // terrain elevation above the layer (taller on plateau, shorter on slopes)
            const horizonY = params.plateauHeight - params.layerDepth;
            return horizonY + Math.sin(x * 0.08) * 0.45 + Math.cos(z * 0.1) * 0.28;
        }

        function init() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf5f0ea);

            camera = new THREE.PerspectiveCamera(38, container.clientWidth / container.clientHeight, 1, 1000);
            // Low, wide oblique angle matching the reference panoramic diagram
            camera.position.set(-2, 22, 76);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.sortObjects = true;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.target.set(0, 2, 0);
            controls.maxPolarAngle = Math.PI / 2 - 0.01;
            controls.update();

            // Lighting — bright, daylight feel to match the reference
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));

            const sun = new THREE.DirectionalLight(0xfff8f0, 0.9);
            sun.position.set(15, 50, 30);
            sun.castShadow = true;
            scene.add(sun);

            const fill = new THREE.DirectionalLight(0xd0e8ff, 0.35);
            fill.position.set(-30, 20, -20);
            scene.add(fill);

            // Terrain contour shader — light beige base, brown lines
            contourMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    lineColor:      { value: new THREE.Color(0x7a4a28) },
                    baseColor:      { value: new THREE.Color(0xede3d4) },
                    contourSpacing: { value: params.contourSpacing }
                },
                vertexShader: `
                    varying vec3 vWorldPos;
                    void main() {
                        vec4 wp = modelMatrix * vec4(position, 1.0);
                        vWorldPos = wp.xyz;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }`,
                fragmentShader: `
                    varying vec3 vWorldPos;
                    uniform vec3 lineColor;
                    uniform vec3 baseColor;
                    uniform float contourSpacing;
                    void main() {
                        float y  = vWorldPos.y;
                        float dF = fwidth(y / contourSpacing);
                        float lp = abs(fract(y / contourSpacing - 0.5) - 0.5) / dF;
                        float ci = 1.0 - min(lp, 1.0);
                        gl_FragColor = vec4(mix(baseColor, lineColor, ci), 1.0);
                    }`,
                side: THREE.DoubleSide
            });

            // Cross-section shader — horizontal geological strata bands on cut faces
            crossSectionMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    lineColor:      { value: new THREE.Color(0x5a3a22) },
                    strataA:        { value: new THREE.Color(0xc9b99a) },
                    strataB:        { value: new THREE.Color(0xaa9278) },
                    strataC:        { value: new THREE.Color(0x8c7460) },
                    strataD:        { value: new THREE.Color(0x6e5848) },
                    contourSpacing: { value: params.contourSpacing }
                },
                vertexShader: `
                    varying vec3 vWorldPos;
                    void main() {
                        vec4 wp = modelMatrix * vec4(position, 1.0);
                        vWorldPos = wp.xyz;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }`,
                fragmentShader: `
                    varying vec3 vWorldPos;
                    uniform vec3 lineColor;
                    uniform vec3 strataA;
                    uniform vec3 strataB;
                    uniform vec3 strataC;
                    uniform vec3 strataD;
                    uniform float contourSpacing;
                    void main() {
                        float y = vWorldPos.y;
                        // Four-colour strata bands cycling by Y
                        float bw   = 1.6;
                        float band = mod(floor(y / bw + 0.5) + 400.0, 4.0);
                        vec3 sc = band < 0.5 ? strataA
                                : band < 1.5 ? strataB
                                : band < 2.5 ? strataC
                                : strataD;
                        // Overlay thin contour lines
                        float dF = fwidth(y / contourSpacing);
                        float ci = 1.0 - min(abs(fract(y / contourSpacing - 0.5) - 0.5) / dF, 1.0);
                        gl_FragColor = vec4(mix(sc, lineColor, ci * 0.7), 1.0);
                    }`,
                side: THREE.DoubleSide
            });

            modelGroup = new THREE.Group();
            scene.add(modelGroup);

            buildParametricModel();
            setupUI();

            window.addEventListener('resize', onResize);
        }

        function buildParametricModel() {
            while (modelGroup.children.length) modelGroup.remove(modelGroup.children[0]);

            const segX = 100, segZ = 46;
            const halfW = params.width / 2;
            const halfD = params.depth / 2;

            // --- 1. Fill surface mesh (plain light cream; pushed back so contour lines sit on top) ---
            const surfGeo = new THREE.PlaneGeometry(params.width, params.depth, 120, 54);
            surfGeo.rotateX(-Math.PI / 2);
            const pos = surfGeo.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                pos.setY(i, getTerrainHeight(pos.getX(i), pos.getZ(i)));
            }
            surfGeo.computeVertexNormals();
            const fillMat = new THREE.MeshStandardMaterial({
                color: 0xf4eee1, roughness: 1.0, metalness: 0.0,
                polygonOffset: true, polygonOffsetFactor: 1.0, polygonOffsetUnits: 1.0,
                side: THREE.DoubleSide, flatShading: false
            });
            const surfMesh = new THREE.Mesh(surfGeo, fillMat);
            surfMesh.receiveShadow = true;
            modelGroup.add(surfMesh);

            // --- 2. CONTOUR LINES as real geometry (marching squares over the height field) ---
            // This renders the topography the way the reference does: thin brown
            // iso-elevation curves, not a shaded surface.
            const gx = 200, gz = 88;
            const xs = [], zs = [], H = [];
            for (let i = 0; i <= gx; i++) xs.push(-halfW + (i / gx) * params.width);
            for (let j = 0; j <= gz; j++) zs.push(-halfD + (j / gz) * params.depth);
            let minH = Infinity, maxH = -Infinity;
            for (let i = 0; i <= gx; i++) {
                H[i] = [];
                for (let j = 0; j <= gz; j++) {
                    const h = getTerrainHeight(xs[i], zs[j]);
                    H[i][j] = h;
                    if (h < minH) minH = h;
                    if (h > maxH) maxH = h;
                }
            }
            const sp = params.contourSpacing;
            const linePos = [];
            for (let L = Math.ceil(minH / sp); L <= Math.floor(maxH / sp); L++) {
                const c = L * sp;
                const ey = c + 0.02; // tiny lift to beat z-fighting with the fill mesh
                for (let i = 0; i < gx; i++) {
                    for (let j = 0; j < gz; j++) {
                        const hA = H[i][j],     ax = xs[i],   az = zs[j];
                        const hB = H[i+1][j],   bx = xs[i+1], bz = zs[j];
                        const hC = H[i+1][j+1], cx = xs[i+1], cz = zs[j+1];
                        const hD = H[i][j+1],   dx = xs[i],   dz = zs[j+1];
                        const cr = [];
                        if ((hA - c) * (hB - c) < 0) { const t=(c-hA)/(hB-hA); cr.push(ax+(bx-ax)*t, az+(bz-az)*t); }
                        if ((hB - c) * (hC - c) < 0) { const t=(c-hB)/(hC-hB); cr.push(bx+(cx-bx)*t, bz+(cz-bz)*t); }
                        if ((hC - c) * (hD - c) < 0) { const t=(c-hC)/(hD-hC); cr.push(cx+(dx-cx)*t, cz+(dz-cz)*t); }
                        if ((hD - c) * (hA - c) < 0) { const t=(c-hD)/(hA-hD); cr.push(dx+(ax-dx)*t, dz+(az-dz)*t); }
                        if (cr.length === 4) {
                            linePos.push(cr[0], ey, cr[1],  cr[2], ey, cr[3]);
                        } else if (cr.length === 8) {
                            linePos.push(cr[0], ey, cr[1],  cr[2], ey, cr[3]);
                            linePos.push(cr[4], ey, cr[5],  cr[6], ey, cr[7]);
                        }
                    }
                }
            }
            const contourGeo = new THREE.BufferGeometry();
            contourGeo.setAttribute('position', new THREE.Float32BufferAttribute(linePos, 3));
            modelGroup.add(new THREE.LineSegments(contourGeo,
                new THREE.LineBasicMaterial({ color: 0x8a4b22 })));

            // --- 3. Thin block skirt. Camera-facing front wall is semi-transparent
            //         so the subsurface horizon shows through (per the brief). ---
            const sideMat  = new THREE.MeshStandardMaterial({ color: 0xcdb595, roughness: 0.95, side: THREE.DoubleSide });
            const frontMat = new THREE.MeshStandardMaterial({ color: 0xcdb595, roughness: 0.95, side: THREE.DoubleSide,
                                                              transparent: true, opacity: 0.18, depthWrite: false });

            function buildWall(pts, isX, fixed, mat) {
                const geo = new THREE.BufferGeometry();
                const verts = [];
                const edgePts = [];
                for (let i = 0; i < pts.length - 1; i++) {
                    const p1 = pts[i], p2 = pts[i + 1];
                    const x1 = isX ? fixed : p1, z1 = isX ? p1 : fixed;
                    const x2 = isX ? fixed : p2, z2 = isX ? p2 : fixed;
                    const y1 = getTerrainHeight(x1, z1);
                    const y2 = getTerrainHeight(x2, z2);
                    verts.push(x1, y1, z1,  x1, params.baseY, z1,  x2, y2, z2);
                    verts.push(x2, y2, z2,  x1, params.baseY, z1,  x2, params.baseY, z2);
                    edgePts.push(new THREE.Vector3(x1, y1, z1));
                    if (i === pts.length - 2) edgePts.push(new THREE.Vector3(x2, y2, z2));
                }
                geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
                geo.computeVertexNormals();
                modelGroup.add(new THREE.Mesh(geo, mat));
                // crisp brown silhouette line along the top edge of the wall
                const eg = new THREE.BufferGeometry().setFromPoints(edgePts);
                modelGroup.add(new THREE.Line(eg, new THREE.LineBasicMaterial({ color: 0x8a4b22 })));
            }

            const xSteps = [], zSteps = [];
            for (let i = 0; i <= segX; i++) xSteps.push(-halfW + (i / segX) * params.width);
            for (let i = 0; i <= segZ; i++) zSteps.push(-halfD + (i / segZ) * params.depth);

            buildWall(xSteps, false, -halfD, sideMat);   // back
            buildWall(xSteps, false,  halfD, frontMat);  // front (camera-facing, transparent)
            buildWall(zSteps, true,  -halfW, sideMat);   // west
            buildWall(zSteps, true,   halfW, sideMat);   // east

            // Base
            const baseGeo = new THREE.PlaneGeometry(params.width, params.depth);
            baseGeo.rotateX(Math.PI / 2);
            const baseMesh = new THREE.Mesh(baseGeo, new THREE.MeshStandardMaterial({ color: 0x9c8567 }));
            baseMesh.position.y = params.baseY;
            modelGroup.add(baseMesh);

            // --- 3. Observation pillars (extend ABOVE terrain to visualise depth-to-layer) ---
            const pillarMat = new THREE.MeshStandardMaterial({ color: 0xf08030, roughness: 0.25, metalness: 0.05 });
            const layerPts = [];

            pillarDefs.forEach(p => {
                const sy  = getTerrainHeight(p.x, p.z);
                const ly  = getLayerHeight(p.x, p.z);
                const len = sy - ly;  // depth to geological horizon

                layerPts.push(new THREE.Vector3(p.x, ly, p.z));

                if (len > 0.3) {
                    // Pillar stands above terrain surface; height encodes depth to layer
                    const geo = new THREE.CylinderGeometry(0.22, 0.22, len, 12);
                    const mesh = new THREE.Mesh(geo, pillarMat);
                    // Bottom cap sits at surface level, top sticks up by `len`
                    mesh.position.set(p.x, sy + len / 2, p.z);
                    modelGroup.add(mesh);
                }

                // Label just above terrain surface, below pillar base
                const lbl = createTextSprite(p.id, '#1a1a1a', 24);
                lbl.position.set(p.x, sy + 0.4, p.z);
                modelGroup.add(lbl);
            });

            // --- 4. Subsurface geological horizon ---
            // Interior tube connecting pillar bases
            const curve = new THREE.CatmullRomCurve3(layerPts);
            const tubeGeo = new THREE.TubeGeometry(curve, 120, 0.22, 8, false);
            modelGroup.add(new THREE.Mesh(tubeGeo, new THREE.MeshBasicMaterial({ color: 0x1d65d8 })));

            // Horizon trace on the front cross-section face (camera-facing wall)
            // This makes the geological horizon clearly visible as a blue line
            const horizonFrontPts = [];
            for (let i = 0; i <= segX; i++) {
                const fx = -halfW + (i / segX) * params.width;
                horizonFrontPts.push(new THREE.Vector3(fx, getLayerHeight(fx, halfD), halfD));
            }
            const frontCurve = new THREE.CatmullRomCurve3(horizonFrontPts);
            const frontTubeGeo = new THREE.TubeGeometry(frontCurve, 150, 0.20, 8, false);
            modelGroup.add(new THREE.Mesh(frontTubeGeo, new THREE.MeshBasicMaterial({ color: 0x1d65d8 })));

            // Horizon trace on the back face
            const horizonBackPts = [];
            for (let i = 0; i <= segX; i++) {
                const bx = -halfW + (i / segX) * params.width;
                horizonBackPts.push(new THREE.Vector3(bx, getLayerHeight(bx, -halfD), -halfD));
            }
            const backCurve = new THREE.CatmullRomCurve3(horizonBackPts);
            const backTubeGeo = new THREE.TubeGeometry(backCurve, 150, 0.20, 8, false);
            modelGroup.add(new THREE.Mesh(backTubeGeo, new THREE.MeshBasicMaterial({ color: 0x1d65d8 })));

            // --- 5. Dashed geological zone boundary lines on the terrain surface ---
            const dashMat = new THREE.LineDashedMaterial({ color: 0x333333, dashSize: 1.2, gapSize: 0.7, linewidth: 1 });

            function addTerrainDashLine(xVals, zFunc) {
                const pts = xVals.map(x => {
                    const z = zFunc(x);
                    return new THREE.Vector3(x, getTerrainHeight(x, z) + 0.08, z);
                });
                const geo = new THREE.BufferGeometry().setFromPoints(pts);
                const line = new THREE.Line(geo, dashMat);
                line.computeLineDistances();
                modelGroup.add(line);
            }

            // Alzette hillside boundary — traces the hillside transition zone
            const hillBoundXVals = [];
            for (let x = -halfW; x <= -4; x += 0.8) hillBoundXVals.push(x);
            addTerrainDashLine(hillBoundXVals, x => -2 + Math.sin((x + 20) * 0.18) * 5);

            // Second arc of hillside boundary (enclosing the slope)
            const hillBoundXVals2 = [];
            for (let x = -halfW; x <= 0; x += 0.8) hillBoundXVals2.push(x);
            addTerrainDashLine(hillBoundXVals2, x => 4 + Math.sin((x + 22) * 0.15) * 4.5);

            // Plateau outline — oval boundary around the plateau top
            const platXVals = [];
            for (let x = -8; x <= 12; x += 0.6) platXVals.push(x);
            addTerrainDashLine(platXVals, x => -5 + Math.cos((x - 2) * 0.22) * 7);
            addTerrainDashLine(platXVals, x => 6 + Math.cos((x - 2) * 0.22) * 6);

            // Haedchen Depression boundary
            const depXVals = [];
            for (let x = 8; x <= halfW; x += 0.8) depXVals.push(x);
            addTerrainDashLine(depXVals, x => -3 + Math.sin((x - 10) * 0.16) * 5);

            // --- 6. Region labels ---
            const lblAlzette = createTextSprite("Alzette hillside", "#555555", 30);
            lblAlzette.position.set(-17, getTerrainHeight(-17, 0) + 3.2, 0);
            modelGroup.add(lblAlzette);

            const lblPlateau = createTextSprite("Pëtschend Plateau", "#333333", 34);
            lblPlateau.position.set(2, getTerrainHeight(2, 0) + 4.5, 0);
            modelGroup.add(lblPlateau);

            const lblHaedchen = createTextSprite("Haedchen Depression", "#555555", 30);
            lblHaedchen.position.set(22, getTerrainHeight(22, 0) + 3.2, 0);
            modelGroup.add(lblHaedchen);
        }

        function createTextSprite(text, colorStr = '#111', size = 24) {
            const canvas = document.createElement('canvas');
            canvas.width = 320; canvas.height = 72;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.font = `600 ${size}px -apple-system, sans-serif`;
            ctx.fillStyle = colorStr;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(245,240,234,0.9)';
            ctx.shadowBlur = 6;
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            const tex = new THREE.CanvasTexture(canvas);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true }));
            sprite.scale.set(6, 1.35, 1);
            return sprite;
        }

        function setupUI() {
            function bind(id, key, lblId) {
                const sl = document.getElementById(id);
                const lb = document.getElementById(lblId);
                sl.addEventListener('input', e => {
                    const v = parseFloat(e.target.value);
                    params[key] = v;
                    lb.innerText = v.toFixed(2);
                    if (key === 'contourSpacing') {
                        contourMaterial.uniforms.contourSpacing.value = v;
                        crossSectionMaterial.uniforms.contourSpacing.value = v;
                    } else {
                        buildParametricModel();
                    }
                });
            }
            bind('param-plateau',    'plateauHeight',   'lbl-plateau');
            bind('param-hillside',   'hillsideDrop',    'lbl-hillside');
            bind('param-depression', 'depressionDepth', 'lbl-depression');
            bind('param-contours',   'contourSpacing',  'lbl-contours');
            bind('param-layer',      'layerDepth',      'lbl-layer');
        }

        function onResize() {
            const c = document.getElementById('canvas-container');
            camera.aspect = c.clientWidth / c.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(c.clientWidth, c.clientHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
