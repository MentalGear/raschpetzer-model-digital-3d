name: Deploy to GitHub Pages

# Builds the zero-build static site into dist/ and publishes it to GitHub Pages.
#
# Setup: in the repo Settings → Pages, set the Source to "GitHub Actions".
# All asset references in index.html are RELATIVE (assets/…, vendor/…), so the
# site works unchanged when served from the project subpath (https://<user>.github.io/<repo>/).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for actions/deploy-pages to publish via the Pages OIDC flow.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; don't cancel an in-flight publish.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Build static site into dist/
        run: npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
